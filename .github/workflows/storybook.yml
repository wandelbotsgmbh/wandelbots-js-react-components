# Publishes Storybook for the protected branches (main, v2, v3) to the
# `gh-pages` branch. Per-PR previews are handled separately by
# `pr-preview.yml`, which deploys to `pr-preview/pr-<num>/`. The
# `clean-exclude` list below ensures neither workflow wipes the other's output.
#
# NOTE: GitHub Pages must be configured to deploy from the `gh-pages` branch
# (Settings → Pages → Source: Deploy from a branch → gh-pages / (root)).

name: Publish Storybook

on:
  push:
    branches:
      - main
      - v2
      - v3
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: storybook-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Determine target folder
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "folder=." >> "$GITHUB_OUTPUT"
          else
            echo "folder=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: storybook-static
          target-folder: ${{ steps.target.outputs.folder }}
          # Preserve other protected-branch deployments and all PR previews.
          clean-exclude: |
            pr-preview/
            v2/
            v3/
          commit-message: "docs(storybook): publish ${{ github.ref_name }} @ ${{ github.sha }}"
