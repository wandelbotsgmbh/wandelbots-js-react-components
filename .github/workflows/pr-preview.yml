# Publishes a per-PR Storybook preview under
# https://<org>.github.io/<repo>/pr-preview/pr-<N>/
#
# Uses rossjrw/pr-preview-action which:
#   - deploys the built storybook to gh-pages under /pr-preview/pr-<N>/
#   - posts (and updates) a sticky comment on the PR with the preview link
#   - removes the preview directory and updates the comment when the PR
#     is closed or merged
#
# The preview is safe to run from forks because the deploy/cleanup only
# happens after the build succeeds, and permissions are scoped per-job.
name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main, v2, v3]

concurrency:
  # Serialize writes to gh-pages; a per-PR sub-group prevents one PR's
  # deploys from cancelling another's.
  group: gh-pages-pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    # Only build when the PR is open; on close we jump straight to the
    # remove step in the deploy job.
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node

      - name: Build Storybook
        run: pnpm run build-storybook

      - uses: actions/upload-artifact@v6
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 1

  deploy:
    needs: [build]
    # Run on close too (for cleanup); `needs.build.result == 'skipped'`
    # is allowed because we gate the deploy action on event.action.
    if: ${{ always() && (github.event.action == 'closed' || needs.build.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download storybook build
        if: github.event.action != 'closed'
        uses: actions/download-artifact@v7
        with:
          name: storybook-static
          path: storybook-static/

      - name: Deploy / remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: storybook-static/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
