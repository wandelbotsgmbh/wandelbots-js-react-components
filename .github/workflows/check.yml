name: check

on:
  pull_request:
    branches:
      - main
      - v2
      - v3

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: pnpm run tsc

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: pnpm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run ci:test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: pnpm run build

  api-surface:
    name: Check API surface for breaking changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch the full history so we can diff against the PR base and
          # inspect commit messages for BREAKING CHANGE markers.
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - name: Build library
        run: pnpm run build
      - name: Verify API reports are up to date
        run: pnpm run api:check
      - name: Check for unversioned breaking changes
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: pnpm run api:check-breaking
