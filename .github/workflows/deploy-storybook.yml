# Builds and publishes the Storybook for the current "live" branches to
# GitHub Pages. Each version branch is deployed to its own subpath:
#
#   main -> /
#   v2   -> /v2/
#   v3   -> /v3/
#
# PR previews are handled separately in pr-preview.yml and live under
# /pr-preview/pr-<N>/. The deploy step uses `clean-exclude` to avoid
# wiping those out.
name: Deploy Storybook

on:
  push:
    branches:
      - main
      - v2
      - v3
  workflow_dispatch:

concurrency:
  # Serialize deploys to the gh-pages branch to avoid races between
  # version branches and PR preview workflows.
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Compute target folder
        id: target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "folder=." >> "$GITHUB_OUTPUT"
          else
            echo "folder=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: storybook-static
          target-folder: ${{ steps.target.outputs.folder }}
          clean: true
          # Preserve PR previews and other version dirs when deploying.
          clean-exclude: |
            pr-preview/**
            v2/**
            v3/**
          commit-message: "deploy: storybook for ${{ github.ref_name }} @ ${{ github.sha }}"
